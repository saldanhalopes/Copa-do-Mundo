[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@chainlink/=node_modules/@chainlink/",
]

[fuzz]
runs = 10000
max_test_rejects = 65536
dictionary_weight = 40
include_push_bytes = false

[invariant]
runs = 5000
depth = 100
fail_on_revert = false
