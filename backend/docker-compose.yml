volumes:
  redis-data:

networks:
  copa-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - copa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:3000
      - JWT_SECRET=change-me-in-production
    env_file:
      - path: .env
        required: false
    networks:
      - copa-network
    restart: unless-stopped

